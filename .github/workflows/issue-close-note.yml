name: Issue Close Note

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  comment-close-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Post close summary comment when structured fields are present
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";

            function extractSection(title) {
              const pattern = new RegExp(`## ${title}\\s*\\n([\\s\\S]*?)(?=\\n## |$)`, "i");
              const match = body.match(pattern);
              return match ? match[1].trim() : "";
            }

            const whatChanged = extractSection("What Changed");
            const verification = extractSection("Verification");
            const remainingRisk = extractSection("Remaining Risk");

            if (!whatChanged || !verification) {
              core.info("Issue body does not contain the required close-summary sections; skipping comment.");
              return;
            }

            const comment = [
              "Automatic close note",
              "",
              "What changed:",
              whatChanged,
              "",
              "Verification:",
              verification,
              remainingRisk ? `\nRemaining risk:\n${remainingRisk}` : "",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment,
            });
